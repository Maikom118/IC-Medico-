# Configuração Nginx para os Serviços IC-Medico
# Salve em: /etc/nginx/sites-available/ic-medico-services
# Link simbólico: sudo ln -s /etc/nginx/sites-available/ic-medico-services /etc/nginx/sites-enabled/

# Upstream dos serviços
upstream ocr_service {
    server localhost:8000;
}

upstream transcricao_service {
    server localhost:8300;
}

server {
    listen 80;
    server_name seu-dominio.com;  # Altere para seu domínio

    # Timeout para uploads grandes
    client_max_body_size 500M;
    client_body_timeout 300s;
    
    # Logs
    access_log /var/log/nginx/ic-medico-services-access.log;
    error_log /var/log/nginx/ic-medico-services-error.log;

    # ========================================
    # SERVIÇO DE OCR
    # ========================================
    location /api/ocr {
        proxy_pass http://ocr_service;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts para processamento de imagens
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================
    # SERVIÇO DE TRANSCRIÇÃO
    # ========================================
    location /transcrever-e-gerar-laudo {
        proxy_pass http://transcricao_service;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts maiores para processamento de áudio
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

