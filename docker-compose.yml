version: '3.8'

services:
  # ================================
  # BACKEND API (FastAPI)
  # ================================
  backend:
    build:
      context: ./backend/models/Database
      dockerfile: Dockerfile
    container_name: ic-medico-backend
    ports:
      - "8100:8100"
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-ic_medico}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./backend/models/Database/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - ic-medico-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`www.iamedbr.com`,`iamedbr.com`) && PathPrefix(`/api`) && !PathPrefix(`/api/ocr`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8100"

  # ================================
  # OCR SERVICE (Node.js)
  # ================================
  ocr:
    build:
      context: ./OCR
      dockerfile: Dockerfile
    container_name: ic-medico-ocr
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - ic-medico-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ocr.rule=Host(`www.iamedbr.com`,`iamedbr.com`) && PathPrefix(`/api/ocr`)"
      - "traefik.http.routers.ocr.entrypoints=websecure"
      - "traefik.http.routers.ocr.tls=true"
      - "traefik.http.services.ocr.loadbalancer.server.port=8000"

  # ================================
  # TRANSCRIÇÃO SERVICE (Python)
  # ================================
  transcricao:
    build:
      context: ./Transcricao
      dockerfile: Dockerfile
    container_name: ic-medico-transcricao
    ports:
      - "8300:8300"
    restart: unless-stopped
    networks:
      - ic-medico-network
    deploy:
      resources:
        limits:
          memory: 4G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transcricao.rule=Host(`www.iamedbr.com`,`iamedbr.com`) && PathPrefix(`/transcricao`)"
      - "traefik.http.routers.transcricao.entrypoints=websecure"
      - "traefik.http.routers.transcricao.tls=true"
      - "traefik.http.services.transcricao.loadbalancer.server.port=8300"

  # ================================
  # FRONTEND (React + Vite)
  # ================================
  frontend:
    image: nginx:alpine
    container_name: ic-medico-frontend
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - ic-medico-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`www.iamedbr.com`) || Host(`iamedbr.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  ic-medico-network:
    driver: bridge
