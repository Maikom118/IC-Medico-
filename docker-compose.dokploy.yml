version: '3.9'

# ============================================
# DOCKER COMPOSE - DOKPLOY (www.iamedbr.com)
# SERVIÇO: OCR APENAS
# ============================================

services:
  # ================================
  # OCR SERVICE (Node.js + Tesseract)
  # ================================
  ocr:
    build:
      context: ./OCR
      dockerfile: Dockerfile
    image: ic-medico-ocr:latest
    container_name: ic-medico-ocr
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
    volumes:
      - ocr_uploads:/app/uploads
      - ocr_temp:/tmp/ocr
    ports:
      - "8000:8000"
    networks:
      - ic-medico-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.iamed-ocr.rule=(Host(`www.iamedbr.com`) || Host(`iamedbr.com`)) && (PathPrefix(`/api/ocr`) || PathPrefix(`/api/rg`))"
        - "traefik.http.routers.iamed-ocr.entrypoints=websecure"
        - "traefik.http.routers.iamed-ocr.tls=true"
        - "traefik.http.services.iamed-ocr.loadbalancer.server.port=8000"

networks:
  ic-medico-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  ocr_uploads:
    driver: local
  ocr_temp:
    driver: local
