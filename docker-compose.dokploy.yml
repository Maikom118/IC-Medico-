version: '3.9'

# ============================================
# DOCKER COMPOSE - DOKPLOY (www.iamedbr.com)
# SERVIÇOS: OCR + TRANSCRIÇÃO + IA
# Backend, Frontend e Database rodando separadamente
# ============================================

services:
  # ================================
  # OCR SERVICE (Node.js + Tesseract)
  # ================================
  ocr:
    build:
      context: ./OCR
      dockerfile: Dockerfile
      cache_from:
        - ic-medico-ocr:latest
    image: ic-medico-ocr:latest
    container_name: ic-medico-ocr
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
      - LOG_LEVEL=info
    volumes:
      - ocr_uploads:/app/uploads
      - ocr_temp:/tmp/ocr
      - ocr_logs:/var/log/ocr
    ports:
      - "8000:8000"
    networks:
      - ic-medico-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.iamed-ocr.rule=(Host(`www.iamedbr.com`) || Host(`iamedbr.com`)) && (PathPrefix(`/api/ocr`) || PathPrefix(`/api/rg`))"
        - "traefik.http.routers.iamed-ocr.entrypoints=websecure"
        - "traefik.http.routers.iamed-ocr.tls=true"
        - "traefik.http.routers.iamed-ocr.priority=200"
        - "traefik.http.services.iamed-ocr.loadbalancer.server.port=8000"
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ================================
  # TRANSCRIÇÃO SERVICE (Python FastAPI)
  # ================================
  transcricao:
    build:
      context: ./Transcricao
      dockerfile: Dockerfile
      cache_from:
        - ic-medico-transcricao:latest
    image: ic-medico-transcricao:latest
    container_name: ic-medico-transcricao
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8300
      - WORKERS=2
      - LOG_LEVEL=info
    volumes:
      - transcricao_uploads:/app/uploads
      - transcricao_models:/app/models
      - transcricao_logs:/var/log/transcricao
    ports:
      - "8300:8300"
    networks:
      - ic-medico-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.iamed-transcricao.rule=(Host(`www.iamedbr.com`) || Host(`iamedbr.com`)) && (PathPrefix(`/transcrever`) || PathPrefix(`/transcricao`))"
        - "traefik.http.routers.iamed-transcricao.entrypoints=websecure"
        - "traefik.http.routers.iamed-transcricao.tls=true"
        - "traefik.http.routers.iamed-transcricao.priority=190"
        - "traefik.http.services.iamed-transcricao.loadbalancer.server.port=8300"
      resources:
        limits:
          cpus: '1.5'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2.5G

  # ================================
  # IA SERVICE (Python FastAPI/scikit-learn)
  # ================================
  ia:
    build:
      context: ./IA_IC
      dockerfile: Dockerfile
      cache_from:
        - ic-medico-ia:latest
    image: ic-medico-ia:latest
    container_name: ic-medico-ia
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8200
      - WORKERS=2
      - LOG_LEVEL=info
      - GROQ_API_KEY=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
    volumes:
      - ia_models:/app/models
      - ia_data:/app/data
      - ia_logs:/var/log/ia
    ports:
      - "8200:8200"
    networks:
      - ic-medico-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.iamed-ia.rule=(Host(`www.iamedbr.com`) || Host(`iamedbr.com`)) && PathPrefix(`/ia`)"
        - "traefik.http.routers.iamed-ia.entrypoints=websecure"
        - "traefik.http.routers.iamed-ia.tls=true"
        - "traefik.http.routers.iamed-ia.priority=180"
        - "traefik.http.services.iamed-ia.loadbalancer.server.port=8200"
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
        reservations:
          cpus: '0.8'
          memory: 2G

networks:
  ic-medico-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  ocr_uploads:
    driver: local
  ocr_temp:
    driver: local
  ocr_logs:
    driver: local
  transcricao_uploads:
    driver: local
  transcricao_models:
    driver: local
  transcricao_logs:
    driver: local
  ia_models:
    driver: local
  ia_data:
    driver: local
  ia_logs:
    driver: local
